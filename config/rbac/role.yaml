---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - create
  - delete
  - get
  - list
  - watch
- apiGroups:
  - validation.devinfra.io
  resources:
  - validations
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - validation.devinfra.io
  resources:
  - validations/finalizers
  verbs:
  - update
- apiGroups:
  - validation.devinfra.io
  resources:
  - validations/status
  verbs:
  - get
  - patch
  - update
